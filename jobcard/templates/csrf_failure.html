<!DOCTYPE html>
<html>
<head>
    <title>Session Expired</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding-top: 100px;
        }
        .box {
            background: white;
            padding: 40px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #e67e22;
        }
        p {
            color: #555;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #3498db;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Session Expired</h2>
        <p>Your session has expired or the form was inactive for too long.</p>
        <p>Please fill the form and try submitting again.</p>
    </div>
</body>
</html>
